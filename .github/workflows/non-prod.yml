# This workflow runs for every pull request
name: Non Prod Daily CI

permissions:
  id-token: write
  contents: read
on:
  schedule:
    - cron: "00 18 * * 1-5"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/non-prod.yml"
      - ".github/workflows/ci_test_go.yml"

jobs:
  getVersion:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/dafny_version.yml
  pr-ci-go:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_test_go.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-all-required:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    if: always()
    needs:
      - getVersion
      - pr-ci-go
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
