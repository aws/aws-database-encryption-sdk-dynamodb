# This workflow runs for every pull request
name: PR CI

permissions:
  contents: read
  id-token: write

on:
  pull_request:

# Concurrency control helps free up runners faster and speed up development.
# When new commits are pushed in PR, the previous workflow run is cancelled.
# If you want to not cancel previous workflow then remove this and commit. Before merging to main add it back.
concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  getVersion:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/dafny_version.yml
  getVerifyVersion:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/dafny_verify_version.yml
  pr-ci-format:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/library_format.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-codegen:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_codegen.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-verification:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVerifyVersion
    uses: ./.github/workflows/library_dafny_verification.yml
    with:
      dafny: ${{needs.getVerifyVersion.outputs.version}}
  pr-ci-test-vector-verification:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVerifyVersion
    uses: ./.github/workflows/test_vector_verification.yml
    with:
      dafny: ${{needs.getVerifyVersion.outputs.version}}
  pr-ci-java:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_test_java.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-java-test-vectors:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_test_vector_java.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-java-examples:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_examples_java.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-net:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_test_net.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-rust:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/library_rust_tests.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-net-test-vectors:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_test_vector_net.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-net-examples:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs: getVersion
    uses: ./.github/workflows/ci_examples_net.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-all-required:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    if: always()
    needs:
      - getVersion
      - getVerifyVersion
      - pr-ci-format
      - pr-ci-codegen
      - pr-ci-verification
      - pr-ci-test-vector-verification
      - pr-ci-java
      - pr-ci-java-test-vectors
      - pr-ci-java-examples
      - pr-ci-net
      - pr-ci-rust
      - pr-ci-net-test-vectors
      - pr-ci-net-examples
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
